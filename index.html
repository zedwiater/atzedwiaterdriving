<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atzedwiater Driving Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand {
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1.2rem;
        }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--accent-color);
        }
        .hero {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .cta-btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--bg-color);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .cta-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">Atzedwiater Driving</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/physics.html">Physics Framework</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Welcome to the Hub</h1>
        <p>A unified platform tracking professional delivery operations, technical research developments, and scale-invariant physics systems.</p>
        <a href="/physics.html" class="cta-btn">Explore the Ps-Cycle Framework</a>
    </div>

</body>
</html>
